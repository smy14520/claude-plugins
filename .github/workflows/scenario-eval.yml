name: Scenario Evaluation

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "场景名（YAML 文件名，不含 .yaml）或 'regression' 跑所有 fixed-request 场景"
        required: true
        default: "todo-greenfield-small"
        type: string
      workflow:
        description: "执行模式：sdd-full / direct / sdd-full,direct（逗号分隔跑对比）"
        required: true
        default: "sdd-full"
        type: string
      model:
        description: "被测模型 ID"
        required: true
        default: "claude-sonnet-4-6"
        type: string
      judge_model:
        description: "评估模型 ID（默认同被测模型）"
        required: false
        default: ""
        type: string
      repeats:
        description: "每个 workflow 重复次数"
        required: false
        default: "1"
        type: string
      enable_review:
        description: "是否启用 review phase"
        required: false
        default: "false"
        type: boolean

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install Python dependencies
        run: pip install anthropic claude-agent-sdk pyyaml

      - name: Run scenario evaluation
        run: |
          python plugins/sdd-kit/tests/scenario_eval/run.py \
            --scenario "${{ inputs.scenario }}" \
            --workflow "${{ inputs.workflow }}" \
            --repeats "${{ inputs.repeats }}" \
            ${{ inputs.enable_review == 'true' && '--enable-review' || '' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EVAL_AI_USER_KEY: ${{ secrets.EVAL_AI_USER_KEY || secrets.ANTHROPIC_API_KEY }}
          EVAL_JUDGE_KEY: ${{ secrets.EVAL_JUDGE_KEY || secrets.ANTHROPIC_API_KEY }}
          SCENARIO_TEST_MODEL: ${{ inputs.model }}
          EVAL_JUDGE_MODEL: ${{ inputs.judge_model || inputs.model }}
          EVAL_AI_USER_MODEL: ${{ inputs.model }}
          RUN_SCENARIO_AI_USER: "1"

      - name: Upload evaluation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-${{ inputs.scenario }}-${{ github.run_number }}
          path: plugins/sdd-kit/tests/scenario_eval/runs/
          retention-days: 30

      - name: Print summary
        if: always()
        run: |
          echo "## Scenario Evaluation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Scenario: ${{ inputs.scenario }}" >> $GITHUB_STEP_SUMMARY
          echo "- Workflow: ${{ inputs.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "- Model: ${{ inputs.model }}" >> $GITHUB_STEP_SUMMARY
          echo "- Repeats: ${{ inputs.repeats }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          # Find and display the latest summary.json
          find plugins/sdd-kit/tests/scenario_eval/runs/ -name "summary.json" -exec echo "### Run Summary" \; -exec cat {} \; >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No summary found" >> $GITHUB_STEP_SUMMARY
