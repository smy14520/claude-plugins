name: customer-service-existing-medium
profile: existing-medium

fixture: express-app

request:
  mode: ai-generated
  text: ""

project_brief: |
  当前 fixture 是一个 Express + TypeScript 的 AI 客服多渠道后端系统，已有微信/抖音渠道 adapter、
  channels 配置模型和统一 webhook 路由。用户侧产品负责人应提出适合该存量后端的中等需求。

org_context: |
  如果对方问到开发/测试环境、依赖安装、启动应用或本机环境变更，你的组织约束是：
  优先使用 Docker / docker-compose 在项目临时工作区内隔离环境；可以要求生成 docker-compose.yml；不要污染当前电脑的全局环境。

ai_user:
  mode: agent

workflows:
  - sdd-full
  - direct

timeouts:
  brainstorm_turns: 14
  impl_turns: 80
  response_timeout: 900

checks:
  required:
    - package_ready
    - impl_recorded
    - has_technical_framing
    - has_slices
    - has_existing_code_anchor
  optional:
    - build_passes
    - tests_pass

evaluation:
  enabled: true
  dimensions:
    - name: prd_quality
      prompt: "评估 PRD 是否正确理解存量代码结构、技术边界与现有模块对齐、slice 不破坏现有功能"
      weight: 0.3
    - name: impl_correctness
      prompt: "评估实现是否满足 PRD 的 acceptance criteria，是否正确集成到现有代码"
      weight: 0.4
    - name: code_quality
      prompt: "评估代码质量：与现有代码风格一致、不引入冗余依赖、测试覆盖新增功能"
      weight: 0.3
