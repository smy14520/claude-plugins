name: existing-cashflow-add-export
profile: existing-medium

fixture: /Users/camellia/Personal/Code/claude/claude-plugins/plugins/sdd-kit/tests/scenario_eval/runs/2026-05-11/comparison-cashflow-medium-sdd-full-9/project

request:
  mode: fixed
  text: |
    我想给这个记账工具加一个"月度报告导出"功能。用户在总览页选择某个月份后，可以点"导出报告"按钮，生成一份包含该月收支汇总、分类明细、预算执行情况的 PDF 或结构化文件（CSV/JSON 都行）。

    具体来说：
    - 导出内容要包含：月份、总收入、总支出、净额、每个分类的支出金额和占比、预算执行进度
    - 如果有标签筛选状态，导出的内容应该反映筛选后的结果
    - 导出格式先做 JSON，后续可能加 CSV
    - 导出的文件名要包含月份信息，比如 cashflow-2026-05.json

ai_user:
  mode: agent

workflows:
  - sdd-full

timeouts:
  brainstorm_turns: 50
  impl_turns: 120
  response_timeout: 3600

checks:
  required:
    - package_ready
    - has_technical_framing
    - has_slices
  optional:
    - impl_recorded
    - build_passes

evaluation:
  enabled: true
  dimensions:
    - name: context_awareness
      prompt: "评估 brainstorm 过程中是否正确读取了现有代码上下文：是否发现了现有的统计 API、数据模型、前端组件结构，并基于这些提出了有针对性的问题"
      weight: 0.3
    - name: prd_quality
      prompt: "评估 PRD 是否正确引用了现有代码的模块、接口和数据结构，而不是凭空设计"
      weight: 0.3
    - name: impl_correctness
      prompt: "评估实现是否正确复用了现有代码的模式和接口，而不是重新发明轮子"
      weight: 0.4
