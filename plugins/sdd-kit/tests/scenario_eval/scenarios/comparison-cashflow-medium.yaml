name: comparison-cashflow-medium
profile: greenfield-medium

fixture: empty

request:
  mode: fixed
  text: |
    我想做一个个人现金流管理的 Web 工具。核心场景：

    1. 快速记账：用户打开页面，输入金额、选分类、可选备注，一笔交易 10 秒内完成。分类支持常用快捷选择（按使用频率排序的 chip 栏），也支持搜索选择长尾分类。系统提供默认分类（餐饮、交通、房租、工资、购物、日用、娱乐、医疗），用户可自定义。

    2. 月度总览：首页展示当月总收入、总支出、净额、各分类支出占比（饼图或条形图），支持切换历史月份查看。每个分类可下钻看明细交易列表，支持编辑和删除。

    3. 预算管理：用户可为每个分类设置月度预算上限，首页展示预算执行进度（已花/上限），超过 80% 警告，超过 100% 标红。

    4. 标签系统：交易可打自由文本标签（如"报销"、"团建"），用于辅助筛选，不影响分类统计。

    技术要求：
    - 后端 Python + FastAPI + PostgreSQL + SQLAlchemy + Alembic
    - 前端 React + TypeScript + Vite
    - 全部容器化：docker-compose 一条命令启动开发环境，包含独立的测试 compose
    - 后端必须有 API 集成测试覆盖 CRUD + 统计 + 预算进度
    - 前端两页结构：录入页（默认首页）+ 总览页，底部 tab 切换

    不做：多用户/登录、移动端原生、银行导入、多币种、投资理财。

ai_user:
  mode: agent

workflows:
  - sdd-full

timeouts:
  brainstorm_turns: 50
  impl_turns: 120
  response_timeout: 3600

checks:
  required:
    - package_ready
    - impl_recorded
    - has_technical_framing
    - has_slices
    - has_acceptance_criteria
  optional:
    - build_passes
    - tests_pass

evaluation:
  enabled: true
  dimensions:
    - name: prd_quality
      prompt: "评估 PRD 是否完整覆盖需求、技术边界清晰、slice 粒度合理"
      weight: 0.2
    - name: architecture
      prompt: "评估代码架构：分层是否清晰、职责是否单一、依赖方向是否正确"
      weight: 0.2
    - name: impl_correctness
      prompt: "评估实现是否满足 PRD 的 acceptance criteria，功能链路是否完整可运行"
      weight: 0.25
    - name: test_quality
      prompt: "评估测试覆盖：是否覆盖关键路径、边界条件、错误场景"
      weight: 0.15
    - name: frontend_ux
      prompt: "评估前端实现：页面结构是否匹配 PRD、交互是否完整、是否有 loading/error 状态"
      weight: 0.1
    - name: devops
      prompt: "评估 Docker/环境配置：是否能一条命令启动、依赖版本是否固定、测试环境是否隔离"
      weight: 0.1
