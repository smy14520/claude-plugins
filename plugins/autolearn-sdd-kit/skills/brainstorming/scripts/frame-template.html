<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Brainstorming Companion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /*
     * BRAINSTORM COMPANION FRAME TEMPLATE
     *
     * Provides:
     * - OS-aware light/dark theming with premium aesthetics
     * - Fixed header and selection indicator bar
     * - Scrollable main content area
     * - CSS helpers for common UI patterns
     */

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    /* ===== THEME VARIABLES ===== */
    :root {
      --font-main: 'Inter', system-ui, -apple-system, sans-serif;
      --bg-primary: #f8f9fb;
      --bg-secondary: #ffffff;
      --bg-tertiary: #eef1f5;
      --bg-glass: rgba(255, 255, 255, 0.72);
      --border: #e2e5eb;
      --border-subtle: #eef1f5;
      --text-primary: #1a1d24;
      --text-secondary: #6b7280;
      --text-tertiary: #9ca3af;
      --accent: #6366f1;
      --accent-light: #818cf8;
      --accent-bg: rgba(99, 102, 241, 0.08);
      --accent-border: rgba(99, 102, 241, 0.3);
      --success: #10b981;
      --success-bg: rgba(16, 185, 129, 0.1);
      --warning: #f59e0b;
      --error: #ef4444;
      --selected-bg: rgba(99, 102, 241, 0.06);
      --selected-border: #6366f1;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.08);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #0f1117;
        --bg-secondary: #1a1d27;
        --bg-tertiary: #252836;
        --bg-glass: rgba(26, 29, 39, 0.85);
        --border: #2d3040;
        --border-subtle: #252836;
        --text-primary: #f1f3f9;
        --text-secondary: #8b92a5;
        --text-tertiary: #5a6178;
        --accent: #818cf8;
        --accent-light: #a5b4fc;
        --accent-bg: rgba(129, 140, 248, 0.1);
        --accent-border: rgba(129, 140, 248, 0.25);
        --success: #34d399;
        --success-bg: rgba(52, 211, 153, 0.1);
        --selected-bg: rgba(129, 140, 248, 0.08);
        --selected-border: #818cf8;
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.25);
        --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.3);
      }
    }

    body {
      font-family: var(--font-main);
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ===== FRAME STRUCTURE ===== */
    .header {
      background: var(--bg-glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 0.625rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .header-brand .logo {
      width: 20px;
      height: 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .header-brand .logo::after {
      content: '✦';
      font-size: 10px;
      color: white;
    }
    .header h1 {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: -0.01em;
    }
    .header .status {
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--success);
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.2rem 0.6rem;
      background: var(--success-bg);
      border-radius: 20px;
    }
    .header .status::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .main { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
    #claude-content {
      padding: 2rem 2rem 3rem;
      max-width: 900px;
      margin: 0 auto;
      min-height: 100%;
    }

    .indicator-bar {
      background: var(--bg-glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      padding: 0.6rem 1.5rem;
      flex-shrink: 0;
      text-align: center;
      z-index: 10;
    }
    .indicator-bar span {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }
    .indicator-bar .selected-text {
      color: var(--accent);
      font-weight: 600;
    }

    /* ===== TYPOGRAPHY ===== */
    h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }
    h3 {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
      letter-spacing: -0.01em;
    }
    .subtitle {
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
    }
    .section { margin-bottom: 2rem; }
    .label {
      font-size: 0.65rem;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    /* ===== OPTIONS (A/B/C choices) ===== */
    .options { display: flex; flex-direction: column; gap: 0.75rem; }
    .option {
      background: var(--bg-secondary);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 1rem 1.25rem;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      box-shadow: var(--shadow-sm);
    }
    .option:hover {
      border-color: var(--accent-border);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }
    .option.selected {
      background: var(--selected-bg);
      border-color: var(--selected-border);
      box-shadow: 0 0 0 2px var(--accent-bg), var(--shadow-md);
    }
    .option .letter {
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      width: 2rem;
      height: 2rem;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.85rem;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }
    .option.selected .letter {
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      color: white;
    }
    .option .content { flex: 1; }
    .option .content h3 {
      font-size: 0.95rem;
      margin-bottom: 0.2rem;
    }
    .option .content p {
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin: 0;
      line-height: 1.5;
    }

    /* ===== CARDS (designs/mockups) ===== */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
    }
    .card {
      background: var(--bg-secondary);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow-sm);
    }
    .card:hover {
      border-color: var(--accent-border);
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
    }
    .card.selected {
      border-color: var(--selected-border);
      border-width: 2px;
      box-shadow: 0 0 0 3px var(--accent-bg), var(--shadow-lg);
    }
    .card-image {
      background: var(--bg-tertiary);
      aspect-ratio: 16/10;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-body { padding: 1rem 1.25rem; }
    .card-body h3 { margin-bottom: 0.3rem; }
    .card-body p {
      color: var(--text-secondary);
      font-size: 0.85rem;
      line-height: 1.5;
    }

    /* ===== MOCKUP CONTAINER ===== */
    .mockup {
      background: var(--bg-secondary);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow-sm);
    }
    .mockup-header {
      background: var(--bg-tertiary);
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .mockup-header::before {
      content: '';
      display: flex;
      gap: 4px;
      width: 36px;
    }
    .mockup-body { padding: 1.5rem; }

    /* ===== SPLIT VIEW ===== */
    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }
    @media (max-width: 700px) {
      .split { grid-template-columns: 1fr; }
    }

    /* ===== PROS/CONS ===== */
    .pros-cons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin: 1rem 0;
    }
    @media (max-width: 500px) {
      .pros-cons { grid-template-columns: 1fr; }
    }
    .pros, .cons {
      background: var(--bg-secondary);
      border-radius: var(--radius-sm);
      padding: 1rem 1.25rem;
      border: 1px solid var(--border);
    }
    .pros h4 {
      color: var(--success);
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .cons h4 {
      color: var(--error);
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .pros ul, .cons ul {
      margin-left: 1.25rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .pros li, .cons li { margin-bottom: 0.3rem; }

    /* ===== PLACEHOLDER ===== */
    .placeholder {
      background: var(--bg-tertiary);
      border: 2px dashed var(--border);
      border-radius: var(--radius-sm);
      padding: 2rem;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 0.85rem;
    }

    /* ===== INLINE MOCKUP ELEMENTS ===== */
    .mock-nav {
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      color: white;
      padding: 0.75rem 1rem;
      display: flex;
      gap: 1.5rem;
      font-size: 0.85rem;
      font-weight: 500;
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
    }
    .mock-sidebar {
      background: var(--bg-tertiary);
      padding: 1rem;
      min-width: 180px;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .mock-content {
      padding: 1.5rem;
      flex: 1;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .mock-button {
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      color: white;
      border: none;
      padding: 0.5rem 1.25rem;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: var(--font-main);
    }
    .mock-button:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }
    .mock-input {
      background: var(--bg-primary);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.5rem 0.75rem;
      width: 100%;
      font-size: 0.85rem;
      color: var(--text-primary);
      font-family: var(--font-main);
      transition: border-color 0.2s ease;
    }
    .mock-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-bg);
    }

    /* ===== SCROLLBAR ===== */
    .main::-webkit-scrollbar { width: 6px; }
    .main::-webkit-scrollbar-track { background: transparent; }
    .main::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
    .main::-webkit-scrollbar-thumb:hover {
      background: var(--text-tertiary);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-brand">
      <div class="logo"></div>
      <h1>Brainstorming</h1>
    </div>
    <div class="status">Connected</div>
  </div>

  <div class="main">
    <div id="claude-content">
      <!-- CONTENT -->
    </div>
  </div>

  <div class="indicator-bar">
    <span id="indicator-text">点击上方选项，然后返回终端继续</span>
  </div>

</body>
</html>
